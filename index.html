<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Canvas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="controls">
        <label>
            Brush Size
            <input type="range" id="brush-slider" min="2" max="15" value="5">
            <span id="brush-value">5</span>
        </label>
        <button id="clear-btn">Clear</button>
        <button id="toggle-path-btn">Hide Path</button>
        <span class="instructions">Click and drag to draw a maze path</span>
    </div>
    <div id="canvas-container">
        <canvas id="maze-canvas"></canvas>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
